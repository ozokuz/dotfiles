general {
  before_sleep_cmd = playerctl pause; loginctl lock-session
  lock_cmd = pidof hyprlock || hyprlock
  after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
  timeout = 120
  on-timeout = brightnessctl -sd platform::kbd_backlight set 0
  on-resume = brightnessctl -rd platform::kbd_backlight
}

listener {
  timeout = 150
  on-timeout = brightnessctl -s set 10
  on-resume = brightnessctl -r
}

listener {
  timeout = 300
  on-timeout = pidof hyprlock || hyprlock --grace 5
}

listener {
  timeout = 330
  on-timeout = hyprctl dispatch dpms off
  on-resume = hyprctl dispatch dpms on && brightnessctl -r
}

listener {
  timeout = 900
  on-timeout = systemctl suspend
}
