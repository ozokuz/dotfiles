# No Maximizing of windows
windowrule = match:class .*, suppress_event maximize

# Fixes some dragging issues with XWayland
windowrule {
  name = fix-xwayland-dragging
  match:class = ^$
  match:title = ^$
  match:xwayland = true
  match:float = true
  match:fullscreen = false
  match:pin = false
  no_focus = true
}

# Special Workspaces
windowrule {
  name = special-workspaces
  match:class = com.nova-desktop.special.*
  float = true
  center = true
  size = 80% 80%
}

# Default locations for apps
windowrule = match:class discord, workspace 7 silent

# Fullscreen screenshot editing
windowrule = match:class com.gabm.satty, fullscreen true

# No focus by default for emote window
windowrule = match:class emote, no_initial_focus true

windowrule = match:class com.libretro.RetroArch, fullscreen true
